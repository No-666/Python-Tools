name: Fill History (Daily Auto + Manual Batch)

on:
  schedule:
    # 每天 UTC 20:00 运行（北京时间次日 4:00）
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: '开始日期 (YYYY-MM-DD)'
        required: true
        default: '2026-03-20'
      end_date:
        description: '2026-12-30'
        required: false
        default: ''
      daily_commits:
        description: '每天提交次数 (用于历史填充)'
        required: true
        default: '12'

jobs:
  fill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "test-1111111111@outlook.com"
          git config --global user.name "No-666"

      - name: Generate commits
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DAILY_COMMITS: ${{ github.event.inputs.daily_commits }}
        run: |
          # 辅助函数：生成 08:00:00 到 23:59:59 之间的随机时间
          generate_random_time() {
            local H=$(printf "%02d" $((RANDOM % 16 + 8))) # 8 到 23 之间的随机小时
            local M=$(printf "%02d" $((RANDOM % 60)))      # 0 到 59 之间的随机分钟
            local S=$(printf "%02d" $((RANDOM % 60)))      # 0 到 59 之间的随机秒数
            echo "${H}:${M}:${S}"
          }

          # 判断触发方式
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时触发：生成今天提交
            TODAY=$(date +%Y-%m-%d)
            COMMITS_PER_DAY=12   # 每天提交次数，可按需修改
            echo "Daily run: generating $COMMITS_PER_DAY commits for $TODAY"
            for i in $(seq 1 $COMMITS_PER_DAY); do
              RANDOM_TIME=$(generate_random_time)
              export GIT_AUTHOR_DATE="$TODAY $RANDOM_TIME"
              export GIT_COMMITTER_DATE="$TODAY $RANDOM_TIME"
              git commit --allow-empty -m "daily fill #$i on $TODAY at $RANDOM_TIME"
            done
          else
            # 手动触发：生成历史提交
            if [ -z "$END_DATE" ]; then
              END_DATE=$(date +%Y-%m-%d)
            fi
            current_date="$START_DATE"
            while [ "$current_date" != "$END_DATE" ]; do
              echo "Generating $DAILY_COMMITS commits for $current_date"
              for i in $(seq 1 $DAILY_COMMITS); do
                RANDOM_TIME=$(generate_random_time)
                export GIT_AUTHOR_DATE="$current_date $RANDOM_TIME"
                export GIT_COMMITTER_DATE="$current_date $RANDOM_TIME"
                git commit --allow-empty -m "chore: sync #$i on $current_date at $RANDOM_TIME"
              done
              current_date=$(date -d "$current_date + 1 day" +%Y-%m-%d)
            done
          fi

      - name: Push commits
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时任务：普通推送（追加）
            git push origin HEAD
          else
            # 手动任务：强制推送（覆盖历史）
            git push --force origin HEAD
          fi
