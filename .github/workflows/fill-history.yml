name: Fill History (Daily Auto + Manual Batch)

on:
  schedule:
    # 每天 UTC 4:00, 12:00, 20:00 各触发一次（配合下方随机休眠实现随机执行）
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: '开始日期 (YYYY-MM-DD) [留空则默认为今天]'
        required: false
        default: ''
      end_date:
        description: '结束日期 (YYYY-MM-DD) [留空则默认为明年今天]'
        required: false
        default: ''
      daily_commits:
        description: '每天提交次数 (用于历史/未来批量填充)'
        required: true
        default: '12'

jobs:
  fill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Random Delay for Schedule
        if: github.event_name == 'schedule'
        run: |
          # 随机延迟 0 到 3600 秒 (1小时)
          # 这样即使 Cron 在固定时间触发，真正的提交行为也会在随机时间发生
          DELAY=$((RANDOM % 3600))
          echo "Scheduled run: Sleeping for $DELAY seconds to randomize execution time..."
          sleep $DELAY

      - name: Configure Git
        run: |
          git config --global user.email "test-1111111111@outlook.com"
          git config --global user.name "No-666"

      - name: Generate commits
        env:
          INPUT_START_DATE: ${{ github.event.inputs.start_date }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
          DAILY_COMMITS: ${{ github.event.inputs.daily_commits }}
        run: |
          # 辅助函数：生成 08:00:00 到 23:59:59 之间的随机时间
          generate_random_time() {
            local H=$(printf "%02d" $((RANDOM % 16 + 8))) # 8 到 23 之间的随机小时
            local M=$(printf "%02d" $((RANDOM % 60)))      # 0 到 59 之间的随机分钟
            local S=$(printf "%02d" $((RANDOM % 60)))      # 0 到 59 之间的随机秒数
            echo "${H}:${M}:${S}"
          }

          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时触发：生成今天提交
            TODAY=$(date +%Y-%m-%d)
            
            # 因为现在一天会调度多次，每次生成的提交数可以随机化（例如每次生成 2 到 5 次提交）
            COMMITS_NOW=$((RANDOM % 4 + 2)) 
            echo "Daily run: generating $COMMITS_NOW commits for $TODAY"
            
            for i in $(seq 1 $COMMITS_NOW); do
              RANDOM_TIME=$(generate_random_time)
              export GIT_AUTHOR_DATE="$TODAY $RANDOM_TIME"
              export GIT_COMMITTER_DATE="$TODAY $RANDOM_TIME"
              git commit --allow-empty -m "daily fill #$i on $TODAY at $RANDOM_TIME"
            done
          else
            # 手动触发：处理动态日期
            # 如果输入为空，则使用 GNU date 动态计算“今天”和“明年今天”
            START_DATE=${INPUT_START_DATE:-$(date +%Y-%m-%d)}
            END_DATE=${INPUT_END_DATE:-$(date -d "+1 year" +%Y-%m-%d)}
            
            echo "Batch run: generating commits from $START_DATE to $END_DATE"
            
            current_date="$START_DATE"
            # 只要 current_date 不大于 END_DATE 就继续循环
            while [[ "$current_date" < "$END_DATE" || "$current_date" == "$END_DATE" ]]; do
              echo "Generating $DAILY_COMMITS commits for $current_date"
              for i in $(seq 1 $DAILY_COMMITS); do
                RANDOM_TIME=$(generate_random_time)
                export GIT_AUTHOR_DATE="$current_date $RANDOM_TIME"
                export GIT_COMMITTER_DATE="$current_date $RANDOM_TIME"
                git commit --allow-empty -m "chore: sync #$i on $current_date at $RANDOM_TIME"
              done
              current_date=$(date -d "$current_date + 1 day" +%Y-%m-%d)
            done
          fi

      - name: Push commits
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时任务：普通推送（追加）
            git push origin HEAD
          else
            # 手动任务：强制推送（由于批量生成未来时间的 commit，如果出错重置时需要强推）
            git push --force origin HEAD
          fi
